services:
  postgres:
    image: postgres:16-alpine
    container_name: sahti-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-sahti}
      POSTGRES_USER: ${DB_USER:-sahti}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sahti}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - sahti-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-sahti} -d ${DB_NAME:-sahti}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  sahti-postgres-data:
